version: '3.8'

# PPE 平台开发环境 Docker Compose 配置
# 用途：本地开发环境一键启动
# 负责人：Maxiao
# 任务：OP-001

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: ppe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ppe_dev
      POSTGRES_PASSWORD: ppe_dev_password_2026
      POSTGRES_DB: ppe_platform
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ppe-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppe_dev -d ppe_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ppe-redis
    restart: unless-stopped
    command: redis-server --requirepass ppe_redis_password_2026 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ppe-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ppe_redis_password_2026", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  # Elasticsearch 搜索引擎
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: ppe-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - "bootstrap.memory_lock=true"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - ppe-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G

  # Kibana（Elasticsearch 可视化，可选）
  kibana:
    image: kibana:8.11.0
    container_name: ppe-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - ppe-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  # pgAdmin（PostgreSQL 管理工具，可选）
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ppe-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ppe-platform.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - ppe-network
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          memory: 512M

  # Redis Commander（Redis 可视化工具，可选）
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ppe-redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:0:ppe_redis_password_2026
    ports:
      - "8081:8081"
    networks:
      - ppe-network
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  ppe-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local
  pgadmin_data:
    driver: local

# 使用简介：
# 
# 1. 启动所有服务：
#    docker compose -f docker-compose.dev.yml up -d
#
# 2. 查看服务状态：
#    docker compose -f docker-compose.dev.yml ps
#
# 3. 查看日志：
#    docker compose -f docker-compose.dev.yml logs -f
#
# 4. 停止所有服务：
#    docker compose -f docker-compose.dev.yml down
#
# 5. 重启服务：
#    docker compose -f docker-compose.dev.yml restart
#
# 6. 查看资源使用：
#    docker stats
#
# 7. 清理所有数据（谨慎使用）：
#    docker compose -f docker-compose.dev.yml down -v
#
# 服务访问地址：
# - PostgreSQL: localhost:5432
# - Redis: localhost:6379
# - Elasticsearch: http://localhost:9200
# - Kibana: http://localhost:5601
# - pgAdmin: http://localhost:5050
# - Redis Commander: http://localhost:8081
