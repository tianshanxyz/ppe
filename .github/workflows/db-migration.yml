name: 数据库迁移自动化

on:
  push:
    branches: [main, master]
    paths:
      - 'ppe-platform/scripts/**.sql'
      - 'ppe-platform/scripts/migrations/**'

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Job 1: 验证 SQL 迁移脚本
  # ============================================
  validate-migration:
    name: 验证 SQL 迁移脚本
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ppe-platform/package-lock.json

      - name: 安装依赖
        working-directory: ppe-platform
        run: npm ci

      - name: 验证 SQL 语法
        working-directory: ppe-platform
        run: |
          # 检查 SQL 文件语法
          for file in scripts/*.sql; do
            if [ -f "$file" ]; then
              echo "验证文件：$file"
              # 基本语法检查（可根据需要扩展）
              if grep -q "DROP TABLE" "$file"; then
                echo "⚠️ 警告：发现 DROP TABLE 语句，请确认是否需要"
              fi
            fi
          done

  # ============================================
  # Job 2: 执行数据库迁移
  # ============================================
  run-migration:
    name: 执行数据库迁移
    runs-on: ubuntu-latest
    needs: [validate-migration]
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ppe-platform/package-lock.json

      - name: 安装依赖
        working-directory: ppe-platform
        run: npm ci

      - name: 安装 Supabase CLI
        run: |
          npm install -g supabase

      - name: 链接 Supabase 项目
        working-directory: ppe-platform
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: 执行数据库迁移
        working-directory: ppe-platform
        run: |
          # 执行迁移脚本
          for file in scripts/migrations/*.sql; do
            if [ -f "$file" ]; then
              echo "执行迁移：$file"
              supabase db execute --file "$file" --db-password ${{ secrets.SUPABASE_DB_PASSWORD }}
            fi
          done

      - name: 验证迁移结果
        working-directory: ppe-platform
        run: |
          # 运行数据库连接测试
          node scripts/test-supabase-connection.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 迁移失败回滚
        if: failure()
        run: |
          echo "迁移失败，请手动检查并回滚"
          echo "回滚脚本位置：scripts/migrations/rollback/"
