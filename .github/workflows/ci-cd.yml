name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ============================================
  # Job 1: 代码质量检查
  # ============================================
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ppe-platform/package-lock.json

      - name: 安装依赖
        working-directory: ppe-platform
        run: npm ci

      - name: 运行 ESLint
        working-directory: ppe-platform
        run: npm run lint

  # ============================================
  # Job 2: 单元测试
  # ============================================
  unit-test:
    name: 单元测试
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ppe-platform/package-lock.json

      - name: 安装依赖
        working-directory: ppe-platform
        run: npm ci

      - name: 运行单元测试
        working-directory: ppe-platform
        run: npm run test:ci
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 上传测试覆盖率报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ppe-platform/coverage
          retention-days: 7

  # ============================================
  # Job 3: E2E 测试
  # ============================================
  e2e-test:
    name: E2E 测试
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ppe-platform/package-lock.json

      - name: 安装依赖
        working-directory: ppe-platform
        run: npm ci

      - name: 安装 Playwright 浏览器
        working-directory: ppe-platform
        run: npx playwright install --with-deps

      - name: 运行 E2E 测试
        working-directory: ppe-platform
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ppe-platform/playwright-report/
          retention-days: 7

  # ============================================
  # Job 4: 构建测试
  # ============================================
  build:
    name: 构建测试
    runs-on: ubuntu-latest
    needs: [lint, unit-test]
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ppe-platform/package-lock.json

      - name: 安装依赖
        working-directory: ppe-platform
        run: npm ci

      - name: 运行构建
        working-directory: ppe-platform
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # ============================================
  # Job 5: 部署到 Vercel（生产环境）
  # ============================================
  deploy-production:
    name: 部署到 Vercel（生产环境）
    runs-on: ubuntu-latest
    needs: [lint, unit-test, e2e-test, build]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ppe-platform/package-lock.json

      - name: 安装 Vercel CLI
        run: npm install --global vercel@latest

      - name: 拉取 Vercel 项目信息
        working-directory: ppe-platform
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 构建项目
        working-directory: ppe-platform
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: 部署到 Vercel
        working-directory: ppe-platform
        run: |
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 部署完成通知
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'Deploy to Vercel',
              description: '部署成功！生产环境已更新',
              target_url: 'https://ppe-platform.vercel.app'
            });

  # ============================================
  # Job 6: 部署失败告警
  # ============================================
  deploy-failure-alert:
    name: 部署失败告警
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: failure()
    
    steps:
      - name: 发送失败通知
        uses: actions/github-script@v7
        with:
          script: |
            const body = `
            ## 🚨 部署失败告警
            
            **项目**: ${context.repo.repo}
            **分支**: ${context.ref}
            **提交**: ${context.sha}
            **时间**: ${new Date().toISOString()}
            **工作流**: ${context.workflow}
            
            请立即检查：https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 部署失败 - ${new Date().toISOString().split('T')[0]}`,
              body: body,
              labels: ['deployment', 'critical']
            });
